<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Abigaile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="garden">
    <header>
      <p class="eyebrow">EIGHT FLOWERS, ONE FOR EVERY LETTER</p>
      <h1>For my lovely<br><em>ABIGAILE.</em></h1>
    </header>

    <section class="flower-field" aria-label="Eight blooming flowers for Abigaile">
      <div class="flowers" aria-hidden="true"></div>
      <div class="grass" aria-hidden="true"></div>
    </section>

    <div class="controls">
      <a class="bloom-link" href="#bloom" aria-label="Bloom eight flowers for Abigaile">
        <span class="link-text">bloom for Abigaile</span><span aria-hidden="true">&#8599;</span>
      </a>
      <p class="message" aria-live="polite">You make every day more beautiful.</p>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
