<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Purple Flower for You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="garden">
    <div class="stars" aria-hidden="true"></div>
    <div class="glow glow-one" aria-hidden="true"></div>
    <div class="glow glow-two" aria-hidden="true"></div>

    <header>
      <p class="eyebrow">A GARDEN MADE WITH LOVE</p>
      <h1>You make my world bloom<br><em>just by being you.</em></h1>
    </header>

    <section class="flower-scene" aria-label="An interactive purple flower garden">
      <div class="fireflies" aria-hidden="true"></div>
      <div class="heaven heaven-back" aria-hidden="true"></div>
      <div class="heaven heaven-mid" aria-hidden="true"></div>
      <div class="bouquet" aria-hidden="true">
        <div class="plant plant-left">
          <div class="stem"></div>
          <div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div>
          <div class="flower"><i></i><i></i><i></i><i></i><i></i><b></b></div>
        </div>
        <div class="plant plant-center">
          <div class="stem"></div>
          <div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="leaf l4"></div>
          <div class="flower"><i></i><i></i><i></i><i></i><i></i><b></b></div>
        </div>
        <div class="plant plant-right">
          <div class="stem"></div>
          <div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div>
          <div class="flower"><i></i><i></i><i></i><i></i><i></i><b></b></div>
        </div>
        <div class="fern fern-left"></div>
        <div class="fern fern-right"></div>
        <div class="grass" aria-hidden="true"></div>
      </div>
      <div class="heaven heaven-front" aria-hidden="true"></div>
    </section>

    <div class="ground" aria-hidden="true">
      <div class="grass-row grass-back"></div>
      <div class="grass-row grass-front"></div>
    </div>

    <a class="bloom-link" href="#bloom" aria-label="Click to make the purple garden bloom">
      <span class="link-text">a flower for you</span><span class="arrow" aria-hidden="true">&#8599;</span>
    </a>
    <p class="message" aria-live="polite">You are loved more than words can say.</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
